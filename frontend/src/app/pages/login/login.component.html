<div class="login-card">

  <!-- Left: image panel -->
  <div class="image-panel">
    <div class="image-overlay">
      <img src="../../../assets/images/pixel-heart-heart.png" alt="AiPocondria" class="brand-icon" />
      <h2 class="brand-name">AiPocondria</h2>
      <p class="brand-tagline">Your personal AI health companion</p>
    </div>
  </div>

  <!-- Right: form panel -->
  <div class="form-panel">

    <!-- Tab switcher -->
    <div class="tab-row">
      <button class="tab-btn" [class.active]="mode === 'login'" (click)="setMode('login')">Sign In</button>
      <button class="tab-btn" [class.active]="mode === 'register'" (click)="setMode('register')">Create Account</button>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>

    <!-- Sign In form -->
    <form *ngIf="mode === 'login'" (ngSubmit)="login()" class="auth-form">
      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" placeholder="you@example.com"
          [(ngModel)]="email" name="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Your password"
          [(ngModel)]="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="submit-btn" [disabled]="isLoading">
        {{ isLoading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <!-- Create Account form -->
    <form *ngIf="mode === 'register'" (ngSubmit)="register()" class="auth-form">
      <div class="field">
        <label for="nameInput">Full name</label>
        <input type="text" id="nameInput" placeholder="Jane Doe"
          [(ngModel)]="name" name="name" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="regEmailInput">Email address</label>
        <input type="email" id="regEmailInput" placeholder="you@example.com"
          [(ngModel)]="regEmail" name="regEmail" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="regPasswordInput">Password <span class="hint">(min. 6 characters)</span></label>
        <input type="password" id="regPasswordInput" placeholder="Choose a password"
          [(ngModel)]="regPassword" name="regPassword" required autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirmPasswordInput">Confirm password</label>
        <input type="password" id="confirmPasswordInput" placeholder="Repeat password"
          [(ngModel)]="confirmPassword" name="confirmPassword" required autocomplete="new-password" />
      </div>
      <button type="submit" class="submit-btn" [disabled]="isLoading">
        {{ isLoading ? 'Creating account…' : 'Create Account' }}
      </button>
    </form>

    <!-- Demo hint -->
    <p class="demo-hint">🔓 Demo mode — any valid-format credentials work for this portfolio app</p>

    <!-- Back link -->
    <p class="back-link"><a href="#" (click)="goBack($event)">← Back to home</a></p>

  </div>
</div>
